name: Edge Case and Stress Testing

on:
  push:
    branches: [main]
    paths:
      - apply.sh
      - common/.stowrc
      - .github/workflows/edge-case-testing.yml
  pull_request:
    paths:
      - apply.sh
      - common/.stowrc
      - .github/workflows/edge-case-testing.yml
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stow-lifecycle:
    name: Stow lifecycle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15-intel]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GNU Stow
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y stow
          else
            brew install stow
          fi
          stow --version
        shell: bash

      - name: Exercise install, restow, and delete
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT

          HOME="$test_home" ./apply.sh --no
          HOME="$test_home" ./apply.sh

          test -L "$test_home/.zshrc"
          test -L "$test_home/.tmux.conf"
          test -e "$test_home/.config/git/config"

          HOME="$test_home" ./apply.sh --restow
          HOME="$test_home" ./apply.sh --delete

          expected_removed=(
            .bashrc-custom
            .zshrc
            .tmux.conf
          )
          for path in "${expected_removed[@]}"; do
            if [ -e "$test_home/$path" ] || [ -L "$test_home/$path" ]; then
              echo "Stow delete left $path behind" >&2
              exit 1
            fi
          done
        shell: bash

      - name: Keep existing files unchanged on conflict
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT

          printf '%s\n' '# existing config' > "$test_home/.zshrc"
          before="$(cksum "$test_home/.zshrc")"

          if HOME="$test_home" ./apply.sh; then
            echo "Expected Stow to reject the existing .zshrc" >&2
            exit 1
          fi

          after="$(cksum "$test_home/.zshrc")"
          test "$before" = "$after"
          grep -qx '# existing config' "$test_home/.zshrc"
        shell: bash
