name: Edge Case and Stress Testing

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      test_level:
        description: "Test intensity level"
        required: true
        default: "standard"
        type: choice
        options:
          - standard
          - intensive
          - stress

jobs:
  stow-edge-cases:
    name: Stow edge cases (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stow
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt update
            sudo apt install -y stow
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install stow
          fi
        shell: bash

      - name: Exercise dry-run, adopt, and restow previews
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT
          HOME="$test_home" ./apply.sh --no
          HOME="$test_home" ./apply.sh --no --adopt
          HOME="$test_home" ./apply.sh --no --restow
        shell: bash

      - name: Verify conflict handling stays non-destructive
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT
          printf '# existing config\n' > "$test_home/.zshrc"
          if HOME="$test_home" ./apply.sh; then
            echo "Expected stow to report an existing-file conflict" >&2
            exit 1
          fi
          grep -q '# existing config' "$test_home/.zshrc"
        shell: bash
