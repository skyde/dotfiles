name: Performance and Monitoring

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  performance-baseline:
    name: Stow preview performance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y stow time
        shell: bash

      - name: Measure dry-run performance
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT
          /usr/bin/time -f 'elapsed=%E max_rss=%MKB' env HOME="$test_home" ./apply.sh --no
        shell: bash

      - name: Verify repeated previews
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT
          for _ in 1 2 3; do
            HOME="$test_home" ./apply.sh --no --restow >/dev/null
          done
        shell: bash
