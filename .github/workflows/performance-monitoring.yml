name: Performance and Monitoring

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - apply.sh
      - common/.stowrc
      - .github/workflows/performance-monitoring.yml
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stow-performance:
    name: Stow performance budget
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y stow time

      - name: Measure repeated dry runs
        run: |
          test_home="$(mktemp -d)"
          metrics="$RUNNER_TEMP/stow-dry-run-metrics.txt"
          trap 'rm -rf "$test_home"' EXIT

          # The dollar expressions belong to the child Bash process.
          # shellcheck disable=SC2016
          /usr/bin/time \
            -f '10 dry runs: elapsed=%E max_rss=%MKB' \
            -o "$metrics" \
            timeout 20s bash -c '
              for _ in {1..10}; do
                HOME="$1" ./apply.sh --no >/dev/null
              done
            ' _ "$test_home"

          cat "$metrics"
          {
            echo "### Stow performance"
            echo '~~~text'
            cat "$metrics"
            echo '~~~'
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Measure install lifecycle
        run: |
          test_home="$(mktemp -d)"
          metrics="$RUNNER_TEMP/stow-lifecycle-metrics.txt"
          trap 'rm -rf "$test_home"' EXIT

          # The dollar expressions belong to the child Bash process.
          # shellcheck disable=SC2016
          /usr/bin/time \
            -f '5 lifecycles: elapsed=%E max_rss=%MKB' \
            -o "$metrics" \
            timeout 30s bash -c '
              for _ in {1..5}; do
                HOME="$1" ./apply.sh >/dev/null
                HOME="$1" ./apply.sh --restow >/dev/null
                HOME="$1" ./apply.sh --delete >/dev/null
              done
            ' _ "$test_home"

          cat "$metrics"
          {
            echo '~~~text'
            cat "$metrics"
            echo '~~~'
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash
