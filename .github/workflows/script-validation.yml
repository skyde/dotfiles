name: Script Validation and Syntax Checking

on:
  push:
    paths:
      - "**.sh"
      - "**.ps1"
      - "common/.local/bin/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "**.sh"
      - "**.ps1"
      - "common/.local/bin/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck Analysis
    runs-on: ubuntu-24.04
    env:
      SHELLCHECK_VERSION: v0.11.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          install_dir="$RUNNER_TEMP/shellcheck"
          mkdir -p "$install_dir"
          curl -fsSL \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            -o "$RUNNER_TEMP/shellcheck.tar.xz"
          tar --no-same-owner -xJf "$RUNNER_TEMP/shellcheck.tar.xz" \
            --strip-components=1 \
            -C "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run ShellCheck on shell scripts
        run: |
          echo "🔍 Running ShellCheck analysis..."

          while IFS= read -r -d '' script; do
            first_line=""
            IFS= read -r first_line < "$script" || true
            if [[ "$first_line" =~ ^#!.*(bash|/sh)([[:space:]]|$) ]]; then
              echo "Checking $script"
              shellcheck -x "$script"
            fi
          done < <(git ls-files -z)

          echo "✅ All shell scripts passed ShellCheck"

  powershell-validation:
    name: PowerShell Script Validation
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PowerShell scripts
        run: |
          Write-Host "🔍 Validating PowerShell scripts..."

          $failed = $false
          Get-ChildItem -Path . -Filter '*.ps1' -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null

            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$($_.FullName): $($errors -join '; ')"
            }
          }

          if ($failed) {
            exit 1
          }

          Write-Host "✅ All PowerShell scripts passed validation"
        shell: pwsh

  documentation-sync:
    name: Documentation Synchronization Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check documentation accuracy
        run: |
          echo "📚 Checking documentation accuracy..."

          # Verify expected package directories exist
          for dir in common mac windows; do
            if [ -d "$dir" ]; then
              echo "  Found $dir"
            else
              echo "❌ Missing expected directory: $dir"
              exit 1
            fi
          done

          # Check VS Code extensions count
          vscode_count=$(grep -vcE '^(#|$)' vscode_extensions.txt)
          echo "  VS Code extensions: $vscode_count"

          # Verify script documentation exists (in README.md or README-usage.md)
          if (grep -q "init.ps1" README.md README-usage.md) && (grep -q "apply.ps1" README.md README-usage.md) && (grep -q "update.ps1" README.md README-usage.md); then
            echo "✅ PowerShell scripts are documented"
          else
            echo "❌ PowerShell script documentation missing"
            exit 1
          fi

          if (grep -q "init.sh" README.md README-usage.md) && (grep -q "apply.sh" README.md README-usage.md) && (grep -q "update.sh" README.md README-usage.md); then
            echo "✅ Shell scripts are documented"
          else
            echo "❌ Shell script documentation missing"
            exit 1
          fi

          # Check for old references
          if grep -q "install.ps1\|install.sh" README.md; then
            echo "❌ README contains references to old install scripts"
            exit 1
          fi

          echo "✅ Documentation is up to date"
