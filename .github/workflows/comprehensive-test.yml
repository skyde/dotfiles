name: Comprehensive Dotfiles Testing

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

concurrency:
  group: comprehensive-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate structure and shell syntax
        run: |
          required_paths=(
            common/.bashrc-custom
            common/.zshrc
            common/.tmux.conf
            common/.config/git/config
            mac/Library
            windows/.vsvimrc
            init.sh
            apply.sh
            update.sh
            init.ps1
            apply.ps1
            update.ps1
          )

          for path in "${required_paths[@]}"; do
            test -e "$path" || {
              echo "Missing required path: $path" >&2
              exit 1
            }
          done

          test -x init.sh
          test -x apply.sh
          test -x update.sh

          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(git ls-files -z '*.sh')

      - name: Preview without installing dependencies
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT
          HOME="$test_home" ./apply.sh --no

  unix-install:
    name: Install lifecycle (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15-intel]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GNU Stow
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y stow
          elif ! command -v stow >/dev/null 2>&1; then
            brew install stow
          fi
          stow --version
        shell: bash

      - name: Exercise bootstrap and Stow lifecycle
        run: |
          test_home="$(mktemp -d)"
          trap 'rm -rf "$test_home"' EXIT

          HOME="$test_home" ./apply.sh --no
          HOME="$test_home" ./apply.sh

          test -L "$test_home/.bashrc-custom"
          test -L "$test_home/.zshrc"
          test -L "$test_home/.tmux.conf"
          test -e "$test_home/.config/git/config"

          HOME="$test_home" AUTO_INSTALL=0 ./init.sh
          HOME="$test_home" ./apply.sh --restow
          HOME="$test_home" ./apply.sh --delete

          expected_removed=(
            .bashrc-custom
            .zshrc
            .tmux.conf
            .config/git/config
            .config/git/ignore
            .config/lazygit/config.yml
          )
          for path in "${expected_removed[@]}"; do
            if [ -e "$test_home/$path" ] || [ -L "$test_home/$path" ]; then
              echo "Stow delete left $path behind" >&2
              exit 1
            fi
          done
        shell: bash

  windows-scripts:
    name: Windows PowerShell behavior
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        run: |
          $failed = $false
          Get-ChildItem -Path . -Filter '*.ps1' -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null

            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$($_.FullName): $($errors -join '; ')"
            }
          }

          if ($failed) {
            exit 1
          }
        shell: pwsh

      - name: Exercise apply and init control flow
        run: |
          $fakeBin = Join-Path $env:RUNNER_TEMP 'fake-stow'
          $testHome = Join-Path $env:RUNNER_TEMP 'dotfiles-home'
          $env:STOW_LOG = Join-Path $env:RUNNER_TEMP 'stow-calls.txt'

          New-Item -ItemType Directory -Force -Path $fakeBin, $testHome | Out-Null
          $stowShim = @'
          @echo off
          echo %*>>"%STOW_LOG%"
          if not "%STOW_EXIT_CODE%"=="" exit /b %STOW_EXIT_CODE%
          exit /b 0
          '@
          $stowShim | Set-Content -Encoding ascii (Join-Path $fakeBin 'stow.cmd')

          $env:PATH = "$fakeBin$([IO.Path]::PathSeparator)$env:PATH"
          $env:USERPROFILE = $testHome
          $env:HOME = $testHome
          $env:AUTO_INSTALL = '0'

          & "$PWD\apply.ps1" --no
          & "$PWD\init.ps1" --no

          $calls = @(Get-Content $env:STOW_LOG)
          if ($calls.Count -ne 4) {
            throw "Expected four Stow calls, got $($calls.Count): $calls"
          }

          $commonCalls = @($calls | Where-Object { $_ -match ' common$' })
          $windowsCalls = @($calls | Where-Object { $_ -match ' windows$' })
          if ($commonCalls.Count -ne 2 -or $windowsCalls.Count -ne 2) {
            throw "Expected common and windows packages twice each: $calls"
          }

          foreach ($call in $calls) {
            if (-not $call.Contains("--target=$testHome")) {
              throw "Stow call used the wrong target: $call"
            }
          }

          $env:STOW_EXIT_CODE = '7'
          $failedAsExpected = $false
          try {
            & "$PWD\apply.ps1" --no
          } catch {
            $failedAsExpected = $true
          }

          if (-not $failedAsExpected) {
            throw 'apply.ps1 ignored a nonzero Stow exit code'
          }

          # The failure was expected and asserted above. Prevent the Actions
          # PowerShell wrapper from reusing Stow's stale native exit code.
          $global:LASTEXITCODE = 0
        shell: pwsh

  powershell-stow:
    name: PowerShell with real GNU Stow
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GNU Stow
        run: |
          sudo apt-get update
          sudo apt-get install -y stow

      - name: Exercise PowerShell lifecycle and failure handling
        run: |
          $testHome = Join-Path $env:RUNNER_TEMP 'powershell-stow-home'
          New-Item -ItemType Directory -Force -Path $testHome | Out-Null

          $env:USERPROFILE = $testHome
          $env:HOME = $testHome
          $env:AUTO_INSTALL = '0'

          & "$PWD/apply.ps1" --no
          & "$PWD/apply.ps1"

          foreach ($path in @('.zshrc', '.vsvimrc', '.config/git/config')) {
            if (-not (Test-Path (Join-Path $testHome $path))) {
              throw "Stow did not install $path"
            }
          }

          & "$PWD/init.ps1" --no
          & "$PWD/apply.ps1" --delete

          foreach ($path in @(
            '.bashrc-custom',
            '.zshrc',
            '.vsvimrc',
            '.config/git/config',
            '.config/lazygit/config.yml'
          )) {
            $target = Join-Path $testHome $path
            if (Get-Item -Force -LiteralPath $target -ErrorAction SilentlyContinue) {
              throw "Stow delete left $path behind"
            }
          }

          $conflictHome = Join-Path $env:RUNNER_TEMP 'powershell-conflict-home'
          New-Item -ItemType Directory -Force -Path $conflictHome | Out-Null
          Set-Content -LiteralPath (Join-Path $conflictHome '.zshrc') -Value '# existing config'
          $env:USERPROFILE = $conflictHome
          $env:HOME = $conflictHome

          $failedAsExpected = $false
          try {
            & "$PWD/apply.ps1"
          } catch {
            $failedAsExpected = $true
          }

          if (-not $failedAsExpected) {
            throw 'apply.ps1 ignored a real Stow conflict'
          }

          $contents = Get-Content -Raw (Join-Path $conflictHome '.zshrc')
          if ($contents.Trim() -ne '# existing config') {
            throw 'Stow changed the existing conflict file'
          }

          # The conflict was expected and asserted above. Prevent the Actions
          # PowerShell wrapper from reusing Stow's stale native exit code.
          $global:LASTEXITCODE = 0
        shell: pwsh

  nvim-clipboard:
    name: Neovim clipboard behavior
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      NVIM_VERSION: v0.12.4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          curl -fsSL "https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-linux-x86_64.tar.gz" \
            -o "$RUNNER_TEMP/nvim.tar.gz"
          tar --no-same-owner -xzf "$RUNNER_TEMP/nvim.tar.gz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Run clipboard behavior tests
        run: |
          nvim --version | head -1
          nvim --headless -u NONE -i NONE -l tests/nvim_clipboard_spec.lua
