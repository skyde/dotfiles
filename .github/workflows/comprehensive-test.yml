name: Comprehensive Dotfiles Testing

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

concurrency:
  group: comprehensive-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate structure and shell syntax
        run: |
          required_paths=(
            common/.bashrc-custom
            common/.zshrc
            common/.tmux.conf
            common/.config/git/config
            mac/Library
            windows/.vsvimrc
            init.sh
            apply.sh
            update.sh
            init.ps1
            apply.ps1
            update.ps1
            tests/shell_behavior_spec.sh
            tests/powershell_behavior_spec.ps1
            tests/nvim_clipboard_spec.lua
          )

          for path in "${required_paths[@]}"; do
            test -e "$path" || {
              echo "Missing required path: $path" >&2
              exit 1
            }
          done

          test -x init.sh
          test -x apply.sh
          test -x update.sh
          test -x test-all-platforms.sh

          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(git ls-files -z '*.sh')

          git config --file common/.config/git/config --list >/dev/null

      - name: Reject duplicate manifest entries
        run: |
          for manifest in packages.txt vscode_extensions.txt; do
            duplicates="$(
              sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' "$manifest" |
                grep -vE '^(#|$)' |
                tr '[:upper:]' '[:lower:]' |
                sort |
                uniq -d
            )"
            if [ -n "$duplicates" ]; then
              echo "Duplicate entries in $manifest:" >&2
              echo "$duplicates" >&2
              exit 1
            fi
          done

  unix-install:
    name: Unix behavior and lifecycle (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15-intel]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shell behavior tests
        run: bash tests/shell_behavior_spec.sh
        shell: bash

      - name: Install GNU Stow
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y stow
          elif ! command -v stow >/dev/null 2>&1; then
            brew install stow
          fi
          stow --version
        shell: bash

      - name: Exercise bootstrap and Stow lifecycle
        run: |
          test_home="$(mktemp -d)"
          delete_home="$(mktemp -d)"
          trap 'rm -rf "$test_home" "$delete_home"' EXIT

          HOME="$test_home" ./apply.sh --no
          HOME="$test_home" ./apply.sh

          test -L "$test_home/.bashrc-custom"
          test -L "$test_home/.zshrc"
          test -L "$test_home/.tmux.conf"
          test -e "$test_home/.config/git/config"

          HOME="$test_home" ./apply.sh --restow
          HOME="$test_home" ./apply.sh --delete

          expected_removed=(
            .bashrc-custom
            .zshrc
            .tmux.conf
          )
          for path in "${expected_removed[@]}"; do
            if [ -e "$test_home/$path" ] || [ -L "$test_home/$path" ]; then
              echo "Stow delete left $path behind" >&2
              exit 1
            fi
          done

          HOME="$delete_home" ./apply.sh --delete
          if find "$delete_home" -mindepth 1 -print -quit | grep -q .; then
            echo "Deleting from an empty HOME created files or directories" >&2
            find "$delete_home" -mindepth 1 -print >&2
            exit 1
          fi
        shell: bash

  windows-scripts:
    name: Windows PowerShell behavior
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        run: |
          $failed = $false
          Get-ChildItem -Path . -Filter '*.ps1' -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null

            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$($_.FullName): $($errors -join '; ')"
            }
          }

          if ($failed) {
            exit 1
          }
        shell: pwsh

      - name: Run PowerShell behavior tests
        id: powershell-tests
        continue-on-error: true
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'powershell-behavior.log'
          & ./tests/powershell_behavior_spec.ps1 *>&1 | Tee-Object -FilePath $log
        shell: pwsh

      - name: Upload PowerShell failure log
        if: steps.powershell-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: powershell-behavior-log
          path: ${{ runner.temp }}/powershell-behavior.log
          if-no-files-found: error

      - name: Enforce PowerShell behavior result
        if: steps.powershell-tests.outcome == 'failure'
        run: exit 1
        shell: pwsh

  neovim-clipboard:
    name: Neovim clipboard behavior
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      NVIM_VERSION: v0.12.4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pinned Neovim
        run: |
          curl -fsSLO "https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-linux-x86_64.tar.gz"
          tar xzf nvim-linux-x86_64.tar.gz
          echo "$PWD/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Run clipboard regression suite
        run: |
          nvim --version | head -1
          nvim --headless -u NONE -i NONE -l tests/nvim_clipboard_spec.lua
