# Easy source of config
unbind-key r
bind-key   r  source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Primary prefix (default)
set -g prefix M-a

# Secondary prefix
set -g prefix2 C-b
bind-key -n S-F10 switch-client -T prefix

# Reduce delay when using Alt-based keys
# Keep a small delay so VS Code's terminal handles escape-prefixed key
# sequences consistently.
set -s escape-time 10

# Start windows and panes numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback history
set -g history-limit 1000000

# Enable mouse support for pane selection, resizing, and scrolling
set -g mouse on

# Let terminal programs such as Neovim receive focus gained/lost events.
set-option -gq focus-events on

# Needed for kitty on macOS so Option sends proper escape sequences
set-option -gq xterm-keys on

# Make tmux recognise keys modified with Alt/Meta/Shift
set-option -gq extended-keys on

# Advertise that xterm-kitty supports extended keys
set-option -gq terminal-features 'xterm-kitty:extkeys'

# Enable OSC 52 clipboard integration
set-option -gq set-clipboard on
set-option -asq terminal-features ',xterm*:clipboard'

# Keep tmux's default copy-pipe path on the same helper as explicit copy
# bindings, so built-in or plugin copy-mode actions behave consistently.
set-option -gq copy-command 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'

# Optional: double-tap Ctrl-b to send a literal C-b
# bind-key C-b send-prefix

# Use VIM bindings
setw -g mode-keys vi

# Vim style visual mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Bind 'C-v' to start block selection (Visual Block)
# This chains 'begin-selection' and 'rectangle-toggle' to start block mode immediately
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle

# Copy selections through the shared clipboard helper.
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode-vi C-Insert send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode    Enter send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode    y send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode    C-Insert send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode    DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'
bind-key -T copy-mode    TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-copy-helper" "$HOME/dotfiles/common/.local/bin/tmux-copy-helper"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-copy-helper 2>/dev/null)" && exec "$helper"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-copy-helper unavailable" 2>/dev/null; echo "tmux-copy-helper unavailable" >&2; exit 127'

# Paste through the same helper Neovim uses, then let tmux bracket the paste
# when the active program has requested bracketed paste mode.
bind-key p run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-paste-helper" "$HOME/dotfiles/common/.local/bin/tmux-paste-helper"; do [ -x "$helper" ] && exec "$helper" "#{pane_id}"; done; fi; helper="$(command -v tmux-paste-helper 2>/dev/null)" && exec "$helper" "#{pane_id}"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-paste-helper unavailable" 2>/dev/null; echo "tmux-paste-helper unavailable" >&2; exit 127'
bind-key -n C-Insert if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; exit 1' 'send-keys C-Insert' 'display-message "Ctrl-Insert: use copy mode or a pane-aware app"'
bind-key -n S-Insert if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" --paste-key #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" --paste-key #{q:pane_current_command} #{q:pane_tty}; exit 1' 'send-keys S-Insert' 'run-shell -b '"'"'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-paste-helper" "$HOME/dotfiles/common/.local/bin/tmux-paste-helper"; do [ -x "$helper" ] && exec "$helper" "#{pane_id}"; done; fi; helper="$(command -v tmux-paste-helper 2>/dev/null)" && exec "$helper" "#{pane_id}"; command -v tmux >/dev/null 2>&1 && tmux display-message "tmux-paste-helper unavailable" 2>/dev/null; echo "tmux-paste-helper unavailable" >&2; exit 127'"'"''
bind-key -n S-Delete if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; exit 1' 'send-keys S-Delete' 'display-message "Shift-Delete: use a pane-aware app to cut"'
bind-key -n C-Left send-keys C-Left
bind-key -n C-Right send-keys C-Right
bind-key -n C-Delete send-keys C-Delete

# Exit copy/edit mode with Escape (useful when tmux captures the key)
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode    Escape send -X cancel

# Jump to start of line in copy mode
bind-key -T copy-mode-vi '_' send -X start-of-line
bind-key -T copy-mode    '_' send -X start-of-line

# Vim bindings for navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Seamless Ctrl-h/j/k/l navigation and Ctrl-\ previous-pane toggling. Keep
# those keys inside pane-aware TUIs, including panes where tmux only sees a
# shell or wrapper command while Neovim/ssh/lazygit is the foreground process.
bind-key -n C-h if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; exit 1' "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; exit 1' "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; exit 1' "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; exit 1' "send-keys C-l" "select-pane -R"
bind-key -n 'C-\' if-shell 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-pane-should-passthrough" "$HOME/dotfiles/common/.local/bin/tmux-pane-should-passthrough"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; done; fi; helper="$(command -v tmux-pane-should-passthrough 2>/dev/null)" && exec "$helper" #{q:pane_current_command} #{q:pane_tty}; exit 1' "send-keys C-\\" "last-pane"

# Create and resize panes from the current working directory.
bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Scroll 16 lines at a time (matches VS Code Shift+F4/Shift+F6 macros) while in copy mode
bind-key -T copy-mode-vi S-F4 send-keys -X -N 16 scroll-up
bind-key -T copy-mode-vi S-F6 send-keys -X -N 16 scroll-down
bind-key -T copy-mode S-F4 send-keys -X -N 16 scroll-up
bind-key -T copy-mode S-F6 send-keys -X -N 16 scroll-down

bind-key -r '<' swap-window -d -t:-1
bind-key -r '>' swap-window -d -t:+1
bind-key C new-window -a -c "#{pane_current_path}"
# Fuzzy session picker; falls back to native choose-tree if fzf is unavailable.
bind-key s run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-fzf-switch-session" "$HOME/dotfiles/common/.local/bin/tmux-fzf-switch-session"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-fzf-switch-session 2>/dev/null)" && exec "$helper"; tmux display-message "tmux-fzf-switch-session unavailable"'
# Open a project Git TUI in a popup at the current pane path.
bind-key g run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-popup-tool" "$HOME/dotfiles/common/.local/bin/tmux-popup-tool"; do [ -x "$helper" ] && exec "$helper" --start-dir #{q:pane_current_path} --title git lazygit gitui; done; fi; helper="$(command -v tmux-popup-tool 2>/dev/null)" && exec "$helper" --start-dir #{q:pane_current_path} --title git lazygit gitui; tmux display-message "tmux-popup-tool unavailable"'
# Open a project file manager in a popup at the current pane path.
bind-key e run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-popup-tool" "$HOME/dotfiles/common/.local/bin/tmux-popup-tool"; do [ -x "$helper" ] && exec "$helper" --start-dir #{q:pane_current_path} --title files yazi lf ranger nnn; done; fi; helper="$(command -v tmux-popup-tool 2>/dev/null)" && exec "$helper" --start-dir #{q:pane_current_path} --title files yazi lf ranger nnn; tmux display-message "tmux-popup-tool unavailable"'
# Create or switch to the project session for the current pane path.
bind-key S run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-session-notify" "$HOME/dotfiles/common/.local/bin/tmux-session-notify"; do [ -x "$helper" ] && exec "$helper" --start-dir #{q:pane_current_path}; done; fi; helper="$(command -v tmux-session-notify 2>/dev/null)" && exec "$helper" --start-dir #{q:pane_current_path}; tmux display-message "tmux-session-notify unavailable"'
# Jump directly to the project session's common workflow windows.
bind-key R run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-session-notify" "$HOME/dotfiles/common/.local/bin/tmux-session-notify"; do [ -x "$helper" ] && exec "$helper" --window resume --start-dir #{q:pane_current_path}; done; fi; helper="$(command -v tmux-session-notify 2>/dev/null)" && exec "$helper" --window resume --start-dir #{q:pane_current_path}; tmux display-message "tmux-session-notify unavailable"'
bind-key A run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-session-notify" "$HOME/dotfiles/common/.local/bin/tmux-session-notify"; do [ -x "$helper" ] && exec "$helper" --window agent --start-dir #{q:pane_current_path}; done; fi; helper="$(command -v tmux-session-notify 2>/dev/null)" && exec "$helper" --window agent --start-dir #{q:pane_current_path}; tmux display-message "tmux-session-notify unavailable"'
bind-key T run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-session-notify" "$HOME/dotfiles/common/.local/bin/tmux-session-notify"; do [ -x "$helper" ] && exec "$helper" --window terminal --start-dir #{q:pane_current_path}; done; fi; helper="$(command -v tmux-session-notify 2>/dev/null)" && exec "$helper" --window terminal --start-dir #{q:pane_current_path}; tmux display-message "tmux-session-notify unavailable"'

# after your prefix declaration
# bind-key l next-window
# bind-key h previous-window

# Use terminal settings that match the host terminal. VS Code, generic
# terminals, and kitty installs without xterm-kitty terminfo should stay on
# xterm-256color; only advertise kitty when both the host and terminfo support it.
if-shell '[ "${TERM_PROGRAM:-}" = "vscode" ] || { [ "${TERM:-}" != "xterm-kitty" ] && [ -z "${KITTY_WINDOW_ID:-}" ] && [ "${TERM_PROGRAM:-}" != "kitty" ]; } || ! infocmp xterm-kitty >/dev/null 2>&1' \
  'set -g default-terminal "xterm-256color"' \
  'set -g default-terminal "xterm-kitty"'
# Advertise truecolor to all terminals tmux runs under
set-option -agq terminal-overrides ",xterm-256color:RGB"
set-option -asq terminal-features ',xterm-kitty:RGB,xterm-256color:RGB,tmux-256color:RGB,screen-256color:RGB'

# Leave Ctrl-s available to terminal programs that use it.
# unbind -n C-s

set-option -gq allow-passthrough on
set-option -gq detach-on-destroy off
set-option -gq display-panes-time 2000

# Theme
set -g status-position top
set -g status-bg        '#1a1b26'
set -g status-fg        '#516e7b'

set -g status-left-length  30
set -g status-right-length 80
set -g status-left "#[bg=#1a1b26,fg=#ff9e64] #S  "
set -g status-right "#[fg=#3C425F]#(hostname) "

setw -g window-status-current-format "#[fg=#88c0d0]#[fg=#88c0d0,bg=#516e7b]#[reverse]#I #[fg=#88c0d0,bg=#1a1b26]#W#[default]#[fg=#88c0d0]"
# set -g status-justify centre

# Improve automatic window naming so panes running a shell show the
# current directory, while other programs keep their command name.
set-option -g allow-rename off
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format '#(if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-status-name.sh" "$HOME/dotfiles/common/.local/bin/tmux-status-name.sh"; do [ -x "$helper" ] && exec "$helper" #{q:pane_current_path} #{q:pane_current_command}; done; fi; helper="$(command -v tmux-status-name.sh 2>/dev/null)" && exec "$helper" #{q:pane_current_path} #{q:pane_current_command}; printf tmux)'

# Remove flags for inactive windows
set-option -g window-status-format " #[fg=#3C425F]#I #[fg=#88c0d0]#W "
# Remove flags for the current (active) window
# set-option -g window-status-current-format "#I:#W"

# Tmux Plugin Manager (TPM) and plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Restore the last session automatically
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-max-pane-history-lines '1000000'
# Restore additional local TUIs that tmux-resurrect does not handle by default.
# Keep this conservative; avoid :all: so one-off commands are not replayed.
set -g @resurrect-processes 'lazygit gitui tig lazydocker k9s btop yazi lf ranger nnn'

# Source local overrides if present
if-shell '[ -f ~/.tmux.conf.local ]' 'source-file ~/.tmux.conf.local'

# Pick a URL or file path from the pane via an fzf popup
bind-key u run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-fzf-url.sh" "$HOME/dotfiles/common/.local/bin/tmux-fzf-url.sh"; do [ -x "$helper" ] && exec "$helper"; done; fi; helper="$(command -v tmux-fzf-url.sh 2>/dev/null)" && exec "$helper"; tmux display-message "tmux-fzf-url unavailable"'
bind-key C-u run-shell -b 'if [ -n "${HOME:-}" ]; then for helper in "$HOME/.local/bin/tmux-fzf-url.sh" "$HOME/dotfiles/common/.local/bin/tmux-fzf-url.sh"; do [ -x "$helper" ] && TMUX_FZF_URL_HISTORY_LINES=10000 exec "$helper"; done; fi; helper="$(command -v tmux-fzf-url.sh 2>/dev/null)" && TMUX_FZF_URL_HISTORY_LINES=10000 exec "$helper"; tmux display-message "tmux-fzf-url unavailable"'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
